Version: 1
Id: Language Prompt
Description: Enforce that ai response language based on a provided locale code (e.g., en-US, fr-FR).
LanguageSupport:
  - Type: LanguagePrompt
    Message: |
      Language Code: {languageCode}
      Language Rules:
        - Operate in strict language mode.
        - Let TARGET_LANGUAGE = "{languageCode}".
        - Every single word of the final response must be in TARGET_LANGUAGE only.
        - Never use any other language under any circumstances.
      Validation Rule:
        - If any word is not in TARGET_LANGUAGE, regenerate the entire response before returning.